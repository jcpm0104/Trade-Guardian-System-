<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Trade Guardian System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#08111f;
  --line:rgba(255,255,255,.08);
  --text:#eaf1ff;
  --muted:#97a7c0;
  --blue:#2f6bff;
  --max:680px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:
    radial-gradient(circle at top, rgba(47,107,255,.15), transparent 35%),
    #08111f;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:min(var(--max),100%);
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:22px;
  padding:48px 34px;
  text-align:center;
}

.logo{
  width:64px;
  height:64px;
  margin:0 auto 20px;
  border-radius:16px;
  display:grid;
  place-items:center;
  background:rgba(47,107,255,.15);
  border:1px solid rgba(255,255,255,.08);
}

h1{
  font-size:34px;
  margin-bottom:12px;
}

.tagline{
  color:#dbe7ff;
  font-weight:600;
  margin-bottom:14px;
}

p{
  color:var(--muted);
  font-size:16px;
  margin-bottom:18px;
}

.back{
  display:inline-block;
  margin-top:22px;
  padding:12px 18px;
  border-radius:10px;
  background:linear-gradient(180deg,#4d82ff,#2f6bff);
  color:white;
  font-weight:700;
  text-decoration:none;
}

.back:hover{
  filter:brightness(1.05);
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L19 5V11.2C19 16.1 15.95 19.35 12 21C8.05 19.35 5 16.1 5 11.2V5L12 2Z" fill="#2F6BFF"/>
      <path d="M8 13L10.2 10.5L12.4 12.1L16 8.2" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>Thank you for signing up</h1>

  <div class="tagline">
    Trade Guardian System
  </div>

  <p>
    Thanks for trusting us and joining the Trade Guardian System early access list.
  </p>

  <p>
    We’ll send you an email as soon as the development of the platform is completed and early access becomes available.
  </p>

  <a class="back" href="index.html">
    Back to website
  </a>

</div>

</body>
</html>
