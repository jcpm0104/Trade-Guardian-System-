<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("LI996XMUQ-qRUN_J3");
})();

const form = document.getElementById("early-access-form");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const formData = new FormData(form);

  try {
    const emailResult = await emailjs.send(
      "service_btqah9n",
      "template_mrfxxp8",
      {
        user_email: email
      }
    );

    console.log("EmailJS success:", emailResult);

    const formspreeResult = await fetch("https://formspree.io/f/mwvrbyan", {
      method: "POST",
      body: formData,
      headers: {
        "Accept": "application/json"
      }
    });

    if (!formspreeResult.ok) {
      const formspreeError = await formspreeResult.text();
      alert("Formspree error: " + formspreeError);
      return;
    }

    window.location.href = "thank-you.html";

  } catch (error) {
    console.error("Full error:", error);
    alert("EmailJS error: " + (error?.text || error?.message || JSON.stringify(error)));
  }
});
</script>
