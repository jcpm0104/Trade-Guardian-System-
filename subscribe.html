<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Early Access — Trade Guardian System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#08111f;
  --panel:#101b2d;
  --line:rgba(255,255,255,.08);
  --text:#eaf1ff;
  --muted:#97a7c0;
  --blue:#2f6bff;
  --radius:22px;
  --max:680px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:
    radial-gradient(circle at top, rgba(47,107,255,.15), transparent 35%),
    #08111f;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:min(var(--max),100%);
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:48px 34px;
  text-align:center;
}

.logo{
  width:64px;
  height:64px;
  margin:0 auto 20px;
  border-radius:16px;
  display:grid;
  place-items:center;
  background:rgba(47,107,255,.15);
  border:1px solid rgba(255,255,255,.08);
}

h1{
  font-size:34px;
  margin-bottom:12px;
}

.tagline{
  color:#dbe7ff;
  font-weight:600;
  margin-bottom:14px;
}

p{
  color:var(--muted);
  font-size:16px;
  margin-bottom:28px;
}

form{
  display:flex;
  flex-direction:column;
  gap:14px;
}

input{
  height:48px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#0c1728;
  color:white;
  padding:0 14px;
  font-size:15px;
}

button{
  height:48px;
  border-radius:10px;
  border:none;
  background:linear-gradient(180deg,#4d82ff,var(--blue));
  color:white;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  filter:brightness(1.05);
}

.note{
  margin-top:18px;
  font-size:13px;
  color:var(--muted);
}

.back{
  display:inline-block;
  margin-top:28px;
  font-size:14px;
  color:#c8d5ea;
  text-decoration:none;
}

.back:hover{
  color:white;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L19 5V11.2C19 16.1 15.95 19.35 12 21C8.05 19.35 5 16.1 5 11.2V5L12 2Z" fill="#2F6BFF"/>
      <path d="M8 13L10.2 10.5L12.4 12.1L16 8.2" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>Early Access</h1>

  <div class="tagline">
    Trade Guardian System
  </div>

  <p>
    The platform is currently under development. Join the early access list and you
    will be notified as soon as the system becomes available.
  </p>

  <form id="early-access-form">
    <input type="email" id="email" name="email" placeholder="Enter your email" required>
    <button type="submit">Join Early Access</button>
  </form>

  <div class="note">
    Early users will receive priority access when the platform launches.
  </div>

  <a class="back" href="index.html">
    ← Back to website
  </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function () {
  emailjs.init("LI996XMUQ-qRUN_J3");
})();

const form = document.getElementById("early-access-form");

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const formData = new FormData();
  formData.append("email", email);

  try {
    await emailjs.send(
      "service_btqah9n",
      "template_mrfxxp8",
      {
        user_email: email
      }
    );

    await fetch("https://formspree.io/f/mwvrbyan", {
      method: "POST",
      body: formData,
      headers: {
        "Accept": "application/json"
      }
    });

    window.location.href = "thank-you.html";
  } catch (error) {
    console.error("Submit error:", error);
    alert("Something went wrong. Please try again.");
  }
});
</script>

</body>
</html>
